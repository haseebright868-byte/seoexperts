<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Submit Page</title>

  <!-- Lottie Animation -->
  <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

  <style>
    /* Mobile Fix */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: #f0f8ff;
      margin: 0;
    }

    h1 {
      color: #2c3e50;
      margin-top: 20px;
      text-align: center;
    }

    /* Button styled link */
    .btn-home {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 25px;
      background-color: #3498db;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 16px;
      transition: background-color 0.3s ease;
    }

    .btn-home:hover {
      background-color: #2980b9;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      body {
        font-size: 14px;
        padding: 10px;
      }

      .btn-home {
        width: 100%;
        text-align: center;
        padding: 12px;
      }

      h1 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>
  <lottie-player src="https://assets3.lottiefiles.com/packages/lf20_jbrw3hcz.json" background="transparent"
    speed="1" style="width: 200px; height: 200px;" autoplay></lottie-player>

  <h1>Message Submitted Successfully!</h1>

  <a href="index.html" class="btn-home">Back To Home Page</a>
</body>

</html>
